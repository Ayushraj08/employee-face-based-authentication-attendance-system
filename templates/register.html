<!DOCTYPE html>
<html>
<head>
    <title>Register - viTan</title>
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

<div class="container">

    <img src="/static/logo.png" class="logo" alt="viTan Logo">

    <div class="subtitle">
        Employee Face Registration
    </div>

    <!-- Only Emp_ID & Work Mode required -->
    <input type="text" id="employee_id" placeholder="Employee ID" class="input">
    
    <select id="work_mode" class="input">
        <option value="">Select Work Mode</option>
        <option value="Office">Office</option>
        <option value="WFH">WFH</option>
    </select>

    <video id="video" autoplay playsinline></video>

    <div class="status" id="blinkStatus">
        Please blink to verify
    </div>

    <button onclick="registerFace()" class="btn">
        Register Face
    </button>

    <!-- Spinner -->
    <div class="spinner" id="spinner"></div>

    <!-- Success & Error Boxes -->
    <div class="success-box" id="successBox"></div>
    <div class="error-box" id="errorBox"></div>

    <a href="/" class="link">
        Back to Attendance
    </a>

    <div class="footer">
        © viTan HR System
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
